<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>iFLY FlowOS</title>
    <!--
      GitHub Pages SPA 重定向（rafgraph/spa-github-pages 方案）。
      访问 /flowos/tickets 时 GitHub 找不到物理文件返回此页，
      此脚本把路径改写为 /flowos/?/tickets 再加载 index.html，由 index.html 内联脚本还原。
      pathSegmentsToKeep = 1：保留首段 "flowos"（即仓库名 / base）。
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
